# =====================================================================
# 📋 TASKS.YAML — v2.0 (target output alignment)
# =====================================================================
# Зміни v1 → v2:
#  ❌ Видалено: HOOK_SCHEMA_WRAP marker і будь-яка згадка про
#               <div itemscope itemtype="https://schema.org/Product"> у тілі опису.
#               CMS OpenCart вже виводить page-level JSON-LD Product.
#  ❌ Видалено: <div class="product-desc-wrap"> wrapper.
#  ❌ Видалено: <br>-spacing → замінено на <hr> після </section>.
#  ✅ Додано:   image_intelligence_task — генерує ImageStoryboard
#               (alt, lead-in <p>, placement_anchor, loading_strategy).
#  ✅ Додано:   seo_metadata_extraction_task — окремий post-pipeline таск,
#               кикофф через post_pipeline_hook після всіх мовних рандів.
#  🔁 Змінено:  copywriting — BLOCKQUOTE_TIP став CONDITIONAL.
#  🔁 Змінено:  html_integration — новий skeleton без Product wrapper.
#               <th scope="row" itemprop="name"> для spec rows (WCAG 1.3.1).
# =====================================================================

url_discovery_task:
  description: >
    Search the web for the official manufacturer's main product page and support pages for {product_name}.

    SEARCH PRIORITIES:
    - For PRINTERS: find Build Volume, Kinematics, Max Temps pages.
    - For FILAMENTS: find Diameter, Net Weight, Drying Settings, Material Properties (Density, Impact Strength).

    Do NOT scrape the text yet. Only return the final list of verified URLs.
    Do NOT include third-party retailers (Amazon, AliExpress, etc.).
  expected_output: >
    A strict numbered list of verified URLs pointing to the official manufacturer pages.
    Each URL must include a one-line description of what data it contains.
  agent: web_researcher

content_extraction_task:
  description: >
    Using the URLs approved by the human operator (provided in the input),
    scrape the full product description, technical specifications, and FAQs using your WebsiteSearchTool.

    EXTRACTION PRIORITIES:
    - Full technical specification tables
    - Official FAQ sections
    - Maintenance/troubleshooting guides
    - Image URLs and video embeds (look for [OFFICIAL_IMAGE: ...] and [OFFICIAL_VIDEO_IFRAME: ...] markers)

    Do NOT extract navigation menus, footers, cookie banners, or advertising blocks.
  expected_output: >
    A comprehensive raw text document containing all scraped data from the approved URLs.
    Images and videos must be marked with [OFFICIAL_IMAGE: url | alt_text] and [OFFICIAL_VIDEO_IFRAME: src] markers.
  agent: web_researcher

tech_specs_extraction_task:
  description: >
    Analyze the raw source text for {product_name}.
    [INPUT DATA]: The text is either provided directly here: {raw_source_text}
    OR passed automatically from the Web Researcher agent's output.

    YOUR EXTRACTION MISSION:

    A. TECHNICAL SPECIFICATIONS (strict metrics only):
       - FOR MACHINES: Build Volume, Max Temps, Kinematics, Speed, Connectivity, Supported Materials.
       - FOR FILAMENTS: Material type (PLA/PETG/ABS), Diameter, Weight, Spool type, Melting Point,
         Physical Properties (Density, Melt Flow Index, Impact Strength, Heat Deflection, Tolerance).
       - Categorize specs logically (e.g., "Motion System", "Temperature", "Dimensions").

    B. KEY FEATURES (top 3-8 selling points):
       - Identify the STRONGEST competitive advantages of this product.
       - For each: provide the feature name, exact metric value, and a 1-2 sentence explanation
         of WHY this matters to a buyer (e.g., "CoreXY kinematics at 600 mm/s enables
         rapid prototyping, cutting print times by up to 70% compared to bed-slingers").
       - These are NOT all specs — only the features that make this product stand out.

    C. MARKETING CONTENT (CRITICAL — extract FULLY):
       - Extract the COMPLETE original marketing/descriptive text from the source.
       - This includes: product narratives, use cases, feature explanations,
         "what makes this product special" sections, user testimonials, application examples.
       - Preserve the FULL text — do NOT summarize or truncate. The copywriter needs this
         as raw material to create a rich product description.
       - Do NOT include navigation menus, cookie banners, or footer text.

    D. SUPPORT DATA: Identify official FAQs or Maintenance/Troubleshooting guides.

    E. VISUAL MEDIA: Scan for [OFFICIAL_IMAGE: ...] and [OFFICIAL_VIDEO_IFRAME: ...] markers.

    JSON STRUCTURE RULE:
    "Technical_Specifications" MUST be nested by categories.
    CORRECT: {{ "Printing": {{ "Speed": "600mm/s" }}, "Dimensions": {{ "Weight": "10kg" }} }}
    WRONG: {{ "Speed": "600mm/s", "Weight": "10kg" }}

    {language_instruction}
  expected_output: >
    A strict JSON object with five keys:
    1. "Technical_Specifications" — nested dict grouped by categories (ONLY physical metrics).
    2. "Key_Features" — array [{{"feature_name":"...","spec_value":"...","benefit":"..."}}] (3-8 items).
    3. "Marketing_Content" — the FULL original marketing text as a single string (NOT summarized).
    4. "Support_Data" — object with "faqs" array and "troubleshooting" array.
    5. "Official_Images" — array [{{"url":"...","alt_text":"...","context":"..."}}].
    NO conversational text, NO markdown. ONLY the pure JSON object.
  agent: tech_specs_analyst

seo_strategy_task:
  description: >
    Analyze the Technical JSON specs and support data for {product_name}.
    Develop a comprehensive SEO and GEO strategy targeted at {target_country} for {site_name}.

    YOUR EXECUTION RULES:
    1. Use your search tool to find real Google autocomplete suggestions for {product_name}
       in {target_country}. Select 10 high-impact keywords based on real search data.
    2. Define a unique Tone of Voice for {site_name} to prevent cannibalization with sister sites.
    3. Create a strict Content Blueprint that MANDATES:
       - An "Answer-First" summary block (40-75 words) at the very top.
       - H2/H3 headings formatted as natural user questions (Semantic Chunking).
       - A dedicated "Troubleshooting" or "Expert Advice" section (E-E-A-T) derived from support data.
    4. Generate strict Meta tags:
       - Title: MAX 55 chars, safe symbols only (✨ ✅ ➔ ! + % |), NO flags/complex emojis.
       - Description: MAX 155 chars, ending with a strong Call to Action.
       - H1: Clean format "[Product Name] [Model]" — NO "Buy", "Cheap", or marketing fluff.
    5. Fact Density directive: instruct copywriter to include specific technical parameters
       (kinematics, temperatures, exact material names) every 150-200 words.
       Replace adjectives like "ultra-precise" with strict metrics (e.g., "0.02 mm").
    6. ALL headers, keywords, and metadata MUST be in ENGLISH.

    {language_instruction}
  expected_output: >
    A master GEO Content Brief containing:
    1. Target Keywords (10) & Tone of Voice instructions for {site_name}.
    2. Structural Outline — H2/H3 questions with explicit "Answer-First" block position.
    3. E-E-A-T directives (e.g., "Include troubleshooting tip for nozzle cleaning").
    4. SEO Metadata JSON: H1 (clean), Title (<55 chars, safe symbols), Description (<155 chars + CTA).
  agent: seo_strategist


# =====================================================================
# ✏️ COPYWRITING TASK (v2 — BLOCKQUOTE_TIP conditional, no Product wrapper)
# =====================================================================
copywriting_task:
  description: >
    Write the master English product description for {product_name} based on
    the Analyst's Technical JSON (Key_Features, Marketing_Content, Support_Data)
    and the SEO Strategist's brief.

    SOURCE ISOLATION RULES (CRITICAL):
    1. BURN THE SOURCE STRUCTURE: Do NOT copy narrative flow or marketing phrases.
       PARAPHRASE Marketing_Content in your own voice.
    2. ZERO EXTERNAL LINKS: Delete all links to manufacturer stores.
    3. BRAND SAFETY: Replace manufacturer CTAs with content adapted for {site_name}.

    === MANDATORY SECTION STRUCTURE (7 core + 1 conditional) ===

    SECTION 1 — "SNIPPET-READY HOOK" (40–75 words):
    Plain declarative sentence. NO microdata wrapper, NO Product schema —
    the CMS handles page-level Product schema. This is just clean prose.
    Format: "<Product Name> is a <Category> built for <Application>,
             featuring <Key Specs>."
    Ban: "In today's world…", "Welcome to…", "Discover…", "Introducing…".
    Use exact metrics from Key_Features.

    SECTION 2 — "KEY SPECS QUICK TABLE" (3–4 rows):
    A compact table of the 3–4 STRONGEST competitive advantages.
    Two columns: spec name | value. Data from Key_Features.
    Do NOT include a <thead> header row — the table goes straight to <tbody>
    with PropertyValue microdata on each <tr> (handled by HTML architect).

    SECTION 3 — "FEATURE DEEP-DIVE" (350–700 words):
    - One H2 header phrased as a benefit-driven question or statement.
    - H3 sub-sections per major feature cluster from Key_Features.
    - Under each H3: 1–3 paragraphs explaining WHAT, WHY (problem solved),
      WHO benefits (use case persona).
    - Fact density: at least one specific metric per 150 words.
    - Sentence rhythm: mix short declarative + longer technical.
    - Prohibited adjectives: cutting-edge, innovative, state-of-the-art,
      perfect, ideal, game-changer. Replace with exact numbers.

    SECTION 4 — "APPLICATIONS LIST":
    H2 + <ul> with 3–5 professional application areas.
    Each <li>: application name + specific workflow benefit.

    SECTION 5 — "EXPERT VERDICT" (80–120 words):
    Professional technical assessment. Label: "Expert Verdict:".
    Structure:
      - What this product does exceptionally well (cite ≥1 metric).
      - Who it is genuinely suited for (precise use case).
      - Notable technical caveat or condition for best performance.
    Format note: EXPERT_INSIGHT_BLOCK (HTML architect wraps in
    <div class="expert-insight">).

    SECTION 6 — "TECHNICAL TIP" (60–100 words) — CONDITIONAL:
    INCLUDE this section ONLY if Marketing_Content or Support_Data contains
    practitioner-grade tip material — e.g., concrete maintenance step,
    calibration nuance, scan-condition advice, material handling caution.
    DO NOT FABRICATE tips. If no such material exists, OMIT this section
    entirely and proceed to Section 7. Marker is BLOCKQUOTE_TIP only when
    the section is emitted.
    When included, structure:
      - Specific actionable advice tied to the product's primary use case.
      - Cite the trigger condition (e.g., "when scanning dark matte surfaces").
      - Practitioner's voice, not feature description.

    SECTION 7 — "FULL TECHNICAL SPECIFICATIONS":
    List ALL specs from Technical_Specifications, organized by category.
    Preserve every numerical value and unit exactly. Zero omissions.
    If JSON has 20 specs, output contains 20 specs.
    Format note: SPECS_TABLE_SECTION (HTML architect applies PropertyValue
    microdata with <th scope="row">).

    SECTION 8 — "WHY BUY FROM {site_name}" (80–150 words, SINGLE PARAGRAPH):
    BRAND CHECK: If {product_name} contains an officially-represented brand,
    you MUST include verbatim: "As an official representative of [Brand],
    we guarantee the best price, authorized service, and official warranty."
    Mention experience since 2012. Use ONLY store advantages from {cta_context}.
    NO bulleted advantage list. NO separate urgency hook paragraph.
    One cohesive paragraph. Format note: CTA_SECTION.

    LANGUAGE: WRITE STRICTLY IN ENGLISH.
    {language_instruction}
  expected_output: >
    A 100% original English product description with 7 mandatory sections
    + 1 conditional (Technical Tip):
      1. Snippet-Ready Hook (40–75 w, plain <p>, NO Product wrapper)
      2. Key Specs Quick Table (3–4 rows, no <thead>)
      3. Feature Deep-Dive (350–700 w, H2/H3)
      4. Applications List (H2 + <ul>, 3–5 items)
      5. Expert Verdict (80–120 w, EXPERT_INSIGHT_BLOCK)
      6. [OPTIONAL] Technical Tip (60–100 w, BLOCKQUOTE_TIP) — only if source
         has practitioner-tip-grade material
      7. Full Technical Specifications (zero omissions, SPECS_TABLE_SECTION)
      8. CTA (single <p>, CTA_SECTION, brand-rep sentence if applicable)
    ZERO external links. ZERO HOOK_SCHEMA_WRAP marker. Metrics every 150 words.
  agent: copywriter


# =====================================================================
# 🔍 QUALITY ASSURANCE TASK (v2 — architectural FATAL conditions added)
# =====================================================================
quality_assurance_task:
  description: >
    Review the Copywriter's draft against the Technical JSON and SEO Brief.

    YOUR STRICT QA CHECKLIST — VERIFY MANDATORY SECTIONS:

    1. SECTION CHECK — Answer-First Hook:
       Does the text start IMMEDIATELY with a 40–75 word declarative summary
       with hard specs? If it starts with "Introduction", "In today's world",
       or generic text → REJECT.

    2. SECTION CHECK — Quick Specs Table: 3–4 competitive-advantage rows present.
    3. SECTION CHECK — Feature Deep-Dive: H2 + H3 structure, 350–700 words,
       fact density ≥1 metric per 150 words.
    4. SECTION CHECK — Applications List: H2 + <ul>, 3–5 items.
    5. SECTION CHECK — Expert Verdict: 80–120 words, ≥1 metric cited.
    6. CONDITIONAL CHECK — Technical Tip:
       Draft contains BLOCKQUOTE_TIP / <blockquote> Technical Tip AND you cannot
       find a verbatim practitioner instruction in Marketing_Content or
       Support_Data that triggered it → REJECT with message:
       "FABRICATED_TIP: Tip section has no source backing.
        Remove Section 6 entirely."
       To verify: search Marketing_Content for words like "tip", "note",
       "calibrat", "recommend", "maintenance", "before each", "avoid",
       "make sure", "ensure". If none match the tip content → fabricated.
       If absent, do NOT penalize.
    7. SECTION CHECK — Full Specs: every spec from Technical_Specifications
       JSON is present. Spec count parity required.
    8. SECTION CHECK — CTA: single paragraph, brand-rep sentence when
       applicable, no separate urgency paragraph, no <ul> advantages.

    === ARCHITECTURAL FATAL CONDITIONS (FAIL immediately, do not negotiate) ===
    - Draft contains 'itemtype="https://schema.org/Product"' anywhere → REJECT.
    - Draft contains 'itemprop="name"' on the hook paragraph → REJECT.
    - Draft contains '<div class="product-desc-wrap">' → REJECT.
    - Draft contains 'HOOK_SCHEMA_WRAP' literal text → REJECT (marker deprecated).
    - Spec count in copywriter output < spec count in Technical_Specifications → REJECT.
    - Any banned adjective (cutting-edge, innovative, state-of-the-art,
      perfect, ideal, game-changer) used non-factually → REJECT.

    Is each "Expert Tip" actionable? (specific condition + specific action)
    → REJECT if generic.

    FATAL REJECTION CRITERIA (REJECT IMMEDIATELY IF):
    - EXTERNAL LINKS: ANY URLs pointing to manufacturer stores.
    - SOURCE MIMICRY: Marketing description sounds exactly like the manufacturer page.
    - MISSING SECTIONS: Any of the 7 mandatory sections absent (Tip is conditional).

    PLAGIARISM CHECK: Use the Similarity Tool. If uniqueness < 80% → REJECT.

    {language_instruction}
  expected_output: >
    A structured QA verdict containing:
    - status: "APPROVED" or "REJECTED"
    - uniqueness_score: float (0–100)
    - sections_present: list of section names found
    - fact_errors: list of specific inaccuracies (empty if none)
    - external_links_found: list of forbidden URLs (empty if none)
    - missing_sections: list of required sections not present (empty if none)
    - expert_insight_present: boolean
    - technical_tip_present: boolean (CONDITIONAL — false is acceptable)
    - architectural_violations: list of fatal conditions hit (Product wrapper,
      product-desc-wrap, HOOK_SCHEMA_WRAP literal, etc.) — empty when clean
    DO NOT output the approved text. ONLY the JSON verification object.
  agent: editor_qa


# =====================================================================
# 🖼️ IMAGE INTELLIGENCE TASK (NEW — повна реалізація з нуля)
# =====================================================================
# Сидить ПІСЛЯ quality_assurance і ПЕРЕД html_integration.
# Споживає: tech_specs (Official_Images) + copywriting draft (H2 anchors)
# Продукує: ImageStoryboard — впорядкований план інтеграції зображень
#           з контекстними lead-in параграфами і loading стратегією.
# =====================================================================
image_intelligence_task:
  description: >
    You orchestrate the visual storyboard for {product_name}'s product page.
    You do NOT write copy and you do NOT emit HTML. You produce a structured
    plan that the HTML architect will materialize.

    INPUT:
      - Official_Images from Technical Specifications JSON: each item has
        url, alt_text (provisional), and context.
      - Copywriter's approved draft (English): used ONLY to identify the H2
        anchors where images should be placed.

    EXECUTION RULES:

    1. IMAGE SELECTION:
       - Use ONLY URLs that appear verbatim in Official_Images. Never hallucinate.
       - If Official_Images is empty, output an empty storyboard (the HTML
         architect will skip image rendering).
       - Maximum images per page: 8. If source has more, pick the 8 most
         informative (prefer feature demonstrations over hero shots).

    2. ALT TEXT (SEO + A11y):
       - Refine the provisional alt_text into a precise, screen-reader-friendly
         description of WHAT IS SHOWN (not what it's marketing).
       - Length 60–160 characters.
       - Mention the product name + the specific demonstrated capability.
       - No keyword stuffing. No marketing adjectives.

    3. LEAD-IN PARAGRAPH (mandatory for every image):
       - A 1–3 sentence English paragraph that introduces the image and
         explains its function within the surrounding section.
       - Must reference the image directly ("The image below shows…",
         "As illustrated…", "The diagram visualizes…").
       - Must contextually tie to the preceding H2 anchor.
       - This paragraph WILL be inserted directly above the <img> tag.

    4. PLACEMENT ANCHOR:
       - From the copywriter's draft, identify the H2 section that the image
         visually supports. Set placement_anchor to the exact H2 text.
       - If the image is a hero/overview shot, set placement_anchor to
         "HERO" — it will be placed right after the Key Specs Quick Table.
       - The order field controls intra-section position (1 = first under
         that anchor, 2 = second, etc.).

    5. LOADING STRATEGY (Core Web Vitals):
       - The image with the lowest global order index gets
         loading_strategy = "eager" (LCP candidate).
       - All other images get loading_strategy = "lazy".

    6. ORDER:
       - Assign a global order integer starting from 1.
       - The first image (order=1) is the LCP candidate.

    OUTPUT CONTRACT:
    Pure JSON conforming to the ImageStoryboard schema. NO markdown fences.
    NO prose preamble. Empty list is valid output.

    {language_instruction}
  expected_output: >
    JSON object matching ImageStoryboard:
    {
      "items": [
        {
          "url": "<exact URL from Official_Images>",
          "alt_text": "<refined 60-160 char description>",
          "lead_in_paragraph": "<1-3 sentence English intro>",
          "placement_anchor": "<exact H2 text from draft, or 'HERO'>",
          "loading_strategy": "eager" | "lazy",
          "order": <integer starting at 1>
        }
      ]
    }
    Exactly ONE item has loading_strategy="eager" (the order=1 item).
    All other items have loading_strategy="lazy".
    NO image without lead_in_paragraph. NO duplicate URLs.
  agent: image_intelligence_analyst


# =====================================================================
# 🏗️ HTML INTEGRATION TASK (v2 — no Product wrapper, <th scope="row">)
# =====================================================================
html_integration_task:
  description: >
    Take the approved English text, the Technical JSON, and the
    ImageStoryboard. Render OpenCart-compliant HTML that opens DIRECTLY
    with the hook paragraph.

    === CRITICAL ARCHITECTURAL RULES ===

    1. NO OUTER WRAPPER. Do NOT emit <div class="product-desc-wrap">.
       The CMS handles the surrounding container.

    2. NO Product schema in body. The page-level CMS already outputs
       schema.org/Product via JSON-LD. Adding a second Product entity
       creates a Google Search Console duplicate and disqualifies rich
       results. FORBIDDEN tokens anywhere in output:
         - itemtype="https://schema.org/Product"
         - itemprop="name" on the hook paragraph
         - itemprop="description" on the hook paragraph

    3. NO <h1>. Heading hierarchy starts at <h2>.

    4. NO <br> tags for spacing. Use <hr> ONLY after </section> closing tags.

    5. ZERO markdown fences. Pure HTML starting with <p> (the hook).

    === MANDATORY SECTION ORDER ===

    SECTION 1 — HOOK (plain HTML, 40–75 words from copywriter Section 1):
    <p>The <strong>{Brand+Model}</strong> is a [Category] built for
    [Application], featuring <b>[Metric 1]</b>, <b>[Metric 2]</b>, …</p>

    SECTION 2 — QUICK SPECS TABLE (3–4 killer specs):
    <div class="table-responsive">
      <table class="table table-striped table-hover table-bordered">
        <tbody>
          <tr itemprop="additionalProperty" itemscope itemtype="https://schema.org/PropertyValue">
            <th scope="row" itemprop="name">[Spec Name]</th>
            <td itemprop="value">[Value with single space before unit]</td>
          </tr>
        </tbody>
      </table>
    </div>

    SECTION 3 — VIDEO (conditional, only if mp4/webm/ogv or iframe in source):
    Type A (iframe YouTube/Vimeo): preserve verbatim; place in deep-dive context.
    Type B (direct mp4/webm/ogv):
    <div style="text-align:center;">
      <video width="100%" height="auto" controls style="max-width: 800px; border: 1px solid #ccc; border-radius: 8px;">
        <source src="[URL]" type="video/[mp4|webm|ogg]">
        Your browser does not support video playback.
      </video>
    </div>
    Detect MIME: .mp4 → video/mp4, .webm → video/webm, .ogv/.ogg → video/ogg.
    Precede the <video> with a contextual lead-in <p> just like images.

    SECTION 4 — DEEP-DIVE (H2 benefit headers + INTERLEAVED IMAGERY):
    For each feature cluster from copywriter:
      <h2>[Benefit-driven question or statement]</h2>
      <p>[1–3 paragraphs. Use <b> for metric inline emphasis (max 2-3 per
         paragraph). <strong> ONLY for brand mentions or main USPs.]</p>

      Then, if the ImageStoryboard has items with placement_anchor matching
      this H2 text (in order field ascending):
        <p>[lead_in_paragraph from storyboard item]</p>
        <img src="[url]"
             alt="[alt_text]"
             style="max-width: 100%; height: auto; display: block; margin: 15px 0;"
             [loading="lazy" if loading_strategy=="lazy"]>

    IMAGE RULES (strict):
      - Every <img> MUST be immediately preceded by its lead_in_paragraph.
      - NO orphan images (no <img> without preceding <p>).
      - NO consecutive images without intervening semantic text.
      - First image globally (order=1, loading_strategy="eager") gets
        NO loading attribute (LCP candidate).
      - All subsequent images REQUIRE loading="lazy".
      - placement_anchor="HERO" items go between Quick Specs Table and
        the first <h2> of the deep-dive.

    SECTION 5 — EXPERT VERDICT:
    <div class="expert-insight" style="background: #f9f9f9; padding: 15px; border-left: 4px solid #333; margin: 20px 0;">
      <strong>Expert Verdict:</strong> [80–120 words from copywriter Section 5]
    </div>

    SECTION 6 — TECHNICAL TIP (CONDITIONAL — only if copywriter emitted Section 6):
    <blockquote>
      <strong>Expert Technical Tip:</strong> [60–100 words from copywriter Section 6]
    </blockquote>
    If copywriter omitted the Tip section, SKIP this block entirely.
    Do NOT fabricate a tip just to fill the slot.

    SECTION 7 — TECHNICAL SPECIFICATIONS:
    <section class="specs">
      <h2>Technical specifications of [Product Name]</h2>
      For EACH category in Technical_Specifications JSON:
        <h3>[Category]</h3>
        <div class="table-responsive">
          <table class="table table-striped table-hover table-bordered">
            <tbody>
              <tr itemprop="additionalProperty" itemscope itemtype="https://schema.org/PropertyValue">
                <th scope="row" itemprop="name">[Property]</th>
                <td itemprop="value">[Value, NO trailing period]</td>
              </tr>
            </tbody>
          </table>
        </div>
      ZERO omissions. If source has 20 specs → output has 20 specs.
      If Technical_Specifications has "in_the_box" / package contents data,
      render as a <ul> WITHOUT an <h3>, preceded by:
        <p><strong>Package contents:</strong></p>
    </section>
    <hr>

    SECTION 8 — HOWTO (conditional, only if Support_Data.troubleshooting OR
    a clear step-by-step procedure exists):
    <section itemscope itemtype="https://schema.org/HowTo">
      <h2 itemprop="name">How to [Task]</h2>
      <p itemprop="description">[Brief procedure description]</p>
      <div itemprop="step" itemscope itemtype="https://schema.org/HowToStep">
        <h3 itemprop="name">[Step title]</h3>
        <p itemprop="text">[Step body]</p>
      </div>
    </section>
    <hr>

    SECTION 9 — FAQ (conditional, only if Support_Data.faqs non-empty):
    <section itemscope itemtype="https://schema.org/FAQPage">
      <div itemprop="mainEntity" itemscope itemtype="https://schema.org/Question">
        <h3 itemprop="name">[Question]</h3>
        <div itemprop="acceptedAnswer" itemscope itemtype="https://schema.org/Answer">
          <p itemprop="text">[Answer]</p>
        </div>
      </div>
    </section>
    <hr>

    SECTION 10 — CTA (single paragraph, no <ul>, no urgency hook block):
    <h2>Why choose {site_name}?</h2>
    <p class="cta">[80–150 words from copywriter Section 8. If brand on
    approved list, include verbatim:
    "As an official representative of <strong>[Brand]</strong>, we guarantee
    the best price, authorized service, and official warranty."]</p>

    === SEMANTIC RULES ===
    - <strong>: ONLY for brand names and main USPs (max 2–3 per page total).
    - <b>: typographic accent for inline metrics ("60 kg", "0.5–1.2 m/s").
      Max 2–3 per paragraph. <b> ≠ <strong> — they have distinct semantic roles.
    - <ul>: feature/application lists. NEVER for key-value spec pairs.
    - <ol>: numbered steps only.
    - NO <script>. NO JSON-LD. Inline microdata attributes only.
    - NO <h1>. Heading hierarchy: h2 → h3 (never skip levels).
    - <hr> only after </section>. NEVER inside sections, NEVER after <p>.

    === SELF-AUDIT BEFORE DELIVERY (FAIL if any YES) ===
    - Output contains 'itemtype="https://schema.org/Product"' → FAIL.
    - Output contains 'product-desc-wrap' → FAIL.
    - Any <td itemprop="name"> instead of <th scope="row" itemprop="name"> → FAIL.
    - Any <br> tag → FAIL.
    - Any <img> without immediately preceding lead-in <p> → FAIL.
    - First image (order=1) has loading="lazy" → FAIL (LCP regression).
    - Any image #2+ missing loading="lazy" → FAIL.
    - <strong> used for non-brand / non-USP content → FAIL.
    - Spec count in output < spec count in Technical_Specifications → FAIL.
    - Two consecutive <img> tags without intervening semantic block → FAIL.
    - <script> tag or JSON-LD present → FAIL.
    - Markdown fences (```html) present → FAIL.

    {language_instruction}
  expected_output: >
    A single raw HTML string starting with <p> (the hook) and ending with
    </p> (CTA close). Section order:
      Hook → Quick Specs → [Video?] → Deep-Dive (H2/H3 with interleaved
      images via storyboard) → Expert Verdict → [Tip?] → Full Specs →
      [HowTo?] → [FAQ?] → CTA.
    Per-row PropertyValue microdata on EVERY spec <tr> using
    <th scope="row" itemprop="name">. NO Product schema. NO <br>.
    <hr> only after </section>. Image loading strategy enforced.
  agent: frontend_developer


# =====================================================================
# 🌍 LOCALIZATION TASK (v2 — no product-desc-wrap rule, label list added)
# =====================================================================
localization_task:
  description: >
    Take the following finalized English HTML product page (with embedded
    Schema.org Microdata on spec rows, FAQ, and HowTo only):

    --- START OF HTML ---
    {base_html}
    --- END OF HTML ---

    Translate and transcreate the content into {target_language} for the
    {site_name} audience.

    UNIVERSAL EXECUTION RULES (apply to ALL markets):
    1. TARGET LANGUAGE: Write the final output exclusively in {target_language}.
    2. EDGE CASE: If input language IS THE SAME as {target_language}, do NOT
       copy — rewrite and paraphrase to improve style and SEO.
    3. SCHEMA PROTECTION: NEVER translate attribute keys (itemprop, itemscope,
       itemtype) or schema values. ONLY translate human-readable text.
       Preserve exact fact numbers.
    4. HTML INTEGRITY: Return ONLY raw HTML. NEVER translate tags, classes,
       URLs, or image src links. The output starts directly with <p>
       (the hook). There is no outer wrapper to preserve.
    5. SEO ATTRIBUTES: You MUST translate text inside alt="..." and
       title="..." attributes.
    6. BRAND SAFETY: Do NOT translate brand/model names. Do NOT add marketing
       claims not present in the source.
    7. COMPETITOR ERADICATION: Overwrite ANY href links to foreign stores /
       manufacturer shops with a relevant category on {site_name}, or remove
       the <a> tag keeping only the text.
    8. TONE: Sound like a senior technical expert speaking to an engineer.
    9. METRICS: Keep metric units as-is (mm, °C, kg). Never convert unless
       explicitly instructed by {market_rules}.
    10. LABEL LOCALIZATION: Translate fixed labels:
        - "Expert Verdict:" → target-language equivalent.
        - "Expert Technical Tip:" → target-language equivalent (only if Tip
          block exists in source).
        - "Why choose {site_name}?" → target-language equivalent.
        - "Technical specifications of [Product]" → target-language equivalent.
        - "Frequently Asked Questions about [Product]" → target-language equivalent.
        - "Package contents:" → target-language equivalent.
        - Video fallback text → target-language equivalent.

    MARKET-SPECIFIC RULES:
    {market_rules}
  expected_output: >
    The localized, production-ready raw HTML string in {target_language}.
    NO Markdown blocks. NO conversational text. Pure HTML with preserved
    Schema.org Microdata (PropertyValue on spec rows, FAQPage, HowTo).
    Output starts with <p> and ends with </p>.
  agent: localizer_generic


# =====================================================================
# 📊 SEO METADATA EXTRACTION TASK (NEW — post-pipeline)
# =====================================================================
# Запускається через post_pipeline_hook після того, як ВСІ мовні файли
# згенеровано. Споживає мапу {language: html_content} і повертає
# SEOMetadataBundle (заглушка для seo_metadata.json артефакту).
# Реалізація через окремий невеликий SEOMetadataCrew (див. crew.py).
# =====================================================================
seo_metadata_extraction_task:
  description: >
    Generate SEO metadata for {site_name} across ALL target languages.

    INPUT:
      - product_name: {product_name}
      - site_name: {site_name}
      - currency_symbol: {currency_symbol}
      - target_languages: {target_languages}  # ISO codes list (e.g., ["en-GB","uk-UA"])
      - finalized_html_by_language: {finalized_html_by_language}
        (mapping {iso_code: full_html_string})

    EXECUTION RULES:

    FOR EACH language in target_languages, produce one SEOMetadataEntry.

    PER-LANGUAGE RULES:

    1. h1:
       - Syntax: "[Brand] [Model]" — strip marketing fluff ("Buy", "Best
         Price", "New", "Cheap", "Top").
       - Examples: "Creality K1 Max" — NOT "Buy Creality K1 Max Cheap".
       - Maximum 120 characters (typically 20–60).

    2. meta_title (MAX 55 chars, HARD LIMIT):
       - Formula: "[Product] - [Benefit] | {site_name}".
       - If [Product] alone > 50 chars, drop [Benefit]:
         "[Product] | {site_name}".
       - The "| {site_name}" suffix is mandatory.
       - Allowed symbols (use AT MOST one): ✨ ✅ ➔ ! + % |
       - Forbidden: flag emojis (🇺🇸🇪🇸…), 📦, complex emojis.
       - If the title exceeds 55 chars, you MUST shorten by dropping the
         Benefit segment. Never publish over-55 titles.

    3. meta_description (MAX 155 chars, HARD LIMIT):
       - Pattern: "Hook + Solution + Spec + CTA".
       - Start with a verb or problem statement.
       - Include 1 hard spec (number with unit) from the product.
       - MUST include {currency_symbol}.
       - MUST end with localized "Buy now ➔" equivalent (the ➔ arrow is
         mandatory). Examples:
         - en: "Buy now ➔"
         - uk: "Купити зараз ➔"
         - es: "Comprar ahora ➔"
         - pl: "Kup teraz ➔"
         - de: "Jetzt kaufen ➔"

    OUTPUT CONTRACT:
    Pure JSON conforming to SEOMetadataBundle. NO markdown fences.
    NO prose preamble.

    {language_instruction}
  expected_output: >
    JSON object matching SEOMetadataBundle:
    {
      "site_name": "{site_name}",
      "seo_data": [
        {
          "language": "<ISO code, e.g., en-GB>",
          "h1": "<clean product+model>",
          "meta_title": "<≤55 chars, ends with | {site_name}>",
          "meta_description": "<≤155 chars, includes currency + spec, ends with ➔>"
        },
        ...
      ]
    }
    One entry per language in target_languages. Validated by Pydantic.
  agent: seo_metadata_extractor
