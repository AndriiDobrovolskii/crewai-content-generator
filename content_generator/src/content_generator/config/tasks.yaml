# =====================================================================
# 📋 TASKS.YAML — Оптимізована версія v2.0
# =====================================================================
# ПРИНЦИПИ РЕФАКТОРИНГУ:
# 1. Кожна задача має явний context (ланцюгування)
# 2. Правила виконання перенесені з backstory агентів сюди
# 3. localization_task отримує {market_rules} динамічно
# =====================================================================

url_discovery_task:
  description: >
    Search the web for the official manufacturer's main product page and support pages for {product_name}.
    
    SEARCH PRIORITIES:
    - For PRINTERS: find Build Volume, Kinematics, Max Temps pages.
    - For FILAMENTS: find Diameter, Net Weight, Drying Settings, Material Properties (Density, Impact Strength).
    
    Do NOT scrape the text yet. Only return the final list of verified URLs.
    Do NOT include third-party retailers (Amazon, AliExpress, etc.).
  expected_output: >
    A strict numbered list of verified URLs pointing to the official manufacturer pages.
    Each URL must include a one-line description of what data it contains.
  agent: web_researcher

content_extraction_task:
  description: >
    Using the URLs approved by the human operator (provided in the input), 
    scrape the full product description, technical specifications, and FAQs using your WebsiteSearchTool.
    
    EXTRACTION PRIORITIES:
    - Full technical specification tables
    - Official FAQ sections
    - Maintenance/troubleshooting guides
    - Image URLs and video embeds (look for [OFFICIAL_IMAGE: ...] and [OFFICIAL_VIDEO_IFRAME: ...] markers)
    
    Do NOT extract navigation menus, footers, cookie banners, or advertising blocks.
  expected_output: >
    A comprehensive raw text document containing all scraped data from the approved URLs.
    Images and videos must be marked with [OFFICIAL_IMAGE: url | alt_text] and [OFFICIAL_VIDEO_IFRAME: src] markers.
  agent: web_researcher

tech_specs_extraction_task:
  description: >
    Analyze the raw source text for {product_name}.
    [INPUT DATA]: The text is either provided directly here: {raw_source_text} 
    OR passed automatically from the Web Researcher agent's output.
    
    YOUR EXTRACTION MISSION:
    
    A. TECHNICAL SPECIFICATIONS (strict metrics only):
       - FOR MACHINES: Build Volume, Max Temps, Kinematics, Speed, Connectivity, Supported Materials.
       - FOR FILAMENTS: Material type (PLA/PETG/ABS), Diameter, Weight, Spool type, Melting Point, 
         Physical Properties (Density, Melt Flow Index, Impact Strength, Heat Deflection, Tolerance).
       - Categorize specs logically (e.g., "Motion System", "Temperature", "Dimensions").
    
    B. KEY FEATURES (top 3-8 selling points):
       - Identify the STRONGEST competitive advantages of this product.
       - For each: provide the feature name, exact metric value, and a 1-2 sentence explanation 
         of WHY this matters to a buyer (e.g., "CoreXY kinematics at 600 mm/s enables 
         rapid prototyping, cutting print times by up to 70% compared to bed-slingers").
       - These are NOT all specs — only the features that make this product stand out.
    
    C. MARKETING CONTENT (CRITICAL — extract FULLY):
       - Extract the COMPLETE original marketing/descriptive text from the source.
       - This includes: product narratives, use cases, feature explanations, 
         "what makes this product special" sections, user testimonials, application examples.
       - Preserve the FULL text — do NOT summarize or truncate. The copywriter needs this 
         as raw material to create a rich product description.
       - Do NOT include navigation menus, cookie banners, or footer text.
    
    D. SUPPORT DATA: Identify official FAQs or Maintenance/Troubleshooting guides.
    
    E. VISUAL MEDIA: Scan for [OFFICIAL_IMAGE: ...] and [OFFICIAL_VIDEO_IFRAME: ...] markers.
    
    JSON STRUCTURE RULE:
    "Technical_Specifications" MUST be nested by categories.
    CORRECT: {{ "Printing": {{ "Speed": "600mm/s" }}, "Dimensions": {{ "Weight": "10kg" }} }}
    WRONG: {{ "Speed": "600mm/s", "Weight": "10kg" }}
    
    {language_instruction}
  expected_output: >
    A strict JSON object with five keys:
    1. "Technical_Specifications" — nested dict grouped by categories (ONLY physical metrics).
    2. "Key_Features" — array [{{"feature_name":"...","spec_value":"...","benefit":"..."}}] (3-8 items).
    3. "Marketing_Content" — the FULL original marketing text as a single string (NOT summarized).
    4. "Support_Data" — object with "faqs" array and "troubleshooting" array.
    5. "Official_Images" — array [{{"url":"...","alt_text":"...","context":"..."}}].
    NO conversational text, NO markdown. ONLY the pure JSON object.
  agent: tech_specs_analyst

seo_strategy_task:
  description: >
    Analyze the Technical JSON specs and support data for {product_name}.
    Develop a comprehensive SEO and GEO strategy targeted at {target_country} for {site_name}.
    
    YOUR EXECUTION RULES:
    1. Use your search tool to find real Google autocomplete suggestions for {product_name} 
       in {target_country}. Select 10 high-impact keywords based on real search data.
    2. Define a unique Tone of Voice for {site_name} to prevent cannibalization with sister sites.
    3. Create a strict Content Blueprint that MANDATES:
       - An "Answer-First" summary block (40-75 words) at the very top.
       - H2/H3 headings formatted as natural user questions (Semantic Chunking).
       - A dedicated "Troubleshooting" or "Expert Advice" section (E-E-A-T) derived from support data.
    4. Generate strict Meta tags:
       - Title: MAX 55 chars, safe symbols only (✨ ✅ ➔ ! + % |), NO flags/complex emojis.
       - Description: MAX 155 chars, ending with a strong Call to Action.
       - H1: Clean format "[Product Name] [Model]" — NO "Buy", "Cheap", or marketing fluff.
    5. Fact Density directive: instruct copywriter to include specific technical parameters 
       (kinematics, temperatures, exact material names) every 150-200 words.
       Replace adjectives like "ultra-precise" with strict metrics (e.g., "0.02 mm").
    6. ALL headers, keywords, and metadata MUST be in ENGLISH.
    
    {language_instruction}
  expected_output: >
    A master GEO Content Brief containing:
    1. Target Keywords (10) & Tone of Voice instructions for {site_name}.
    2. Structural Outline — H2/H3 questions with explicit "Answer-First" block position.
    3. E-E-A-T directives (e.g., "Include troubleshooting tip for nozzle cleaning").
    4. SEO Metadata JSON: H1 (clean), Title (<55 chars, safe symbols), Description (<155 chars + CTA).
  agent: seo_strategist

# tasks.yaml — REPLACE copywriting_task ENTIRELY

copywriting_task:
  description: >
    Write the master English product description for {product_name} based on 
    the Analyst's Technical JSON (including Key_Features and Marketing_Content) 
    and the SEO Strategist's brief.
    
    SOURCE ISOLATION RULES (CRITICAL):
    1. BURN THE SOURCE STRUCTURE: Do NOT copy the narrative flow or marketing phrases verbatim.
       PARAPHRASE the Marketing_Content using your own voice and structure.
    2. ZERO EXTERNAL LINKS: Delete ALL links to manufacturer stores.
    3. BRAND SAFETY: Replace any manufacturer CTAs with content adapted for {site_name}.
    
    === MANDATORY 8-SECTION STRUCTURE ===
    
    SECTION 1 — "SNIPPET-READY HOOK" (40-75 words):
    Format: "[Product Name] — це [Category] designed for [Applications], featuring [Key Specs]."
    This MUST be a declarative sentence. Ban: "In today's world...", "Welcome to...", 
    "Discover...", "Introducing...". Start directly with the product name and a fact.
    Use exact metrics from Key_Features. Wrap in Schema.org Product microdata 
    (the HTML architect will handle tags — you write the text content here, 
    noting: HOOK_SCHEMA_WRAP).
    
    SECTION 2 — "KEY SPECS QUICK TABLE" (3-4 rows):
    A compact table with the 3-4 STRONGEST competitive advantages.
    Columns: Key Feature | Value. Data from Key_Features JSON.
    
    SECTION 3 — "FEATURE DEEP-DIVE" (the main body, 350-700 words):
    This is NOT a single narrative block. Structure it as:
    - One H2 header: "What makes {product_name} [its primary differentiator]?"
    - Then H3 sub-sections for each major feature cluster from Key_Features.
      Example: "H3: [Feature Name] — [Specific Benefit]"
    - Under each H3: 1-3 paragraphs explaining the feature, WHY it matters (problem it solves),
      and WHO benefits (use case persona: engineer, designer, production manager).
    - Maintain HIGH FACT DENSITY: specific metrics every 150 words minimum.
    - Mix sentence rhythm: short declarative sentences with longer technical explanations.
    - Prohibited adjectives: "cutting-edge", "innovative", "state-of-the-art", "perfect", 
      "ideal", "game-changer". Replace with exact numbers.
    
    SECTION 4 — "APPLICATIONS LIST":
    An H2 + <ul> listing 3-5 professional application areas.
    Each <li> must contain: application name + specific workflow benefit.
    Example: "Automotive aftermarket engineering: digitize body panels and interior components 
    for accessory design, dimensional verification and technical documentation."
    
    SECTION 5 — "EXPERT VERDICT" (80-120 words):
    Write a professional expert analysis block. Label: "Expert Verdict:".
    This is a TECHNICAL assessment, not marketing copy. Structure:
    - What this product does exceptionally well (cite specific metrics)
    - Who it is genuinely suited for (be precise about the use case)
    - Any notable technical caveat or condition for best performance
    Format note: EXPERT_INSIGHT_BLOCK (the HTML architect will apply styling).
    
    SECTION 6 — "TECHNICAL TIP" (60-100 words):
    A professional maintenance or usage tip relevant to the product's primary use case.
    This is a practitioner's advice, not a feature description.
    Format note: BLOCKQUOTE_TIP (the HTML architect will wrap in <blockquote>).
    Example: "For maximum accuracy, calibrate before each critical scan session, 
    especially after transport. When capturing dark matte surfaces, activate 
    the reflective object camera mode and minimize red overexposure zones..."
    
    SECTION 7 — "FULL TECHNICAL SPECIFICATIONS":
    List ALL specs from Technical_Specifications JSON, organized by their categories.
    Preserve ALL numerical values and units exactly as in JSON. Zero omissions.
    If the JSON has 20 specs, output must contain 20 specs.
    Format note: SPECS_TABLE_SECTION (HTML architect will apply Schema.org PropertyValue microdata).
    
    SECTION 8 — "WHY BUY FROM {site_name}" (CTA):
    Write an 80-150 word section.
    BRAND CHECK: If {product_name} contains a brand from the official representative list,
    you MUST include: "As an official representative of [Brand Name], we guarantee 
    the best price, authorized service, and official warranty."
    Use ONLY store advantages from {cta_context}. End with urgency hook.
    Format note: CTA_SECTION (HTML architect will apply <p class="cta">).
    
    LANGUAGE CONSTRAINT: WRITE STRICTLY IN ENGLISH.
    {language_instruction}
  expected_output: >
    A highly engaging, 100% original English product description with ALL 8 sections:
    1. Snippet-Ready Hook (40-75 words, HOOK_SCHEMA_WRAP marker)
    2. Key Specs Quick Table (3-4 rows)
    3. Feature Deep-Dive (350-700 words, H2/H3 hierarchy, paraphrased)
    4. Applications List (H2 + ul, 3-5 items with workflow context)
    5. Expert Verdict (80-120 words, EXPERT_INSIGHT_BLOCK marker)
    6. Technical Tip (60-100 words, BLOCKQUOTE_TIP marker)
    7. Full Technical Specifications (ALL specs, zero omissions, SPECS_TABLE_SECTION marker)
    8. CTA for {site_name} (CTA_SECTION marker, brand representative sentence if applicable)
    ZERO external links. Rich narrative with metrics every 150 words.
  agent: copywriter

quality_assurance_task:
  description: >
    Review the Copywriter's draft against the Technical JSON and SEO Brief.
    
    YOUR STRICT QA CHECKLIST — VERIFY ALL 6 MANDATORY SECTIONS:
    
    1. SECTION CHECK — Answer-First Hook: 
       Does the text start IMMEDIATELY with a 45-70 word declarative summary with hard specs? 
       If it starts with "Introduction" or generic text → REJECT.
    
    2. SECTION CHECK — Key Features Table:
       Is there a table with 3-8 rows containing Feature/Spec/Benefit columns?
       Cross-reference features against "Key_Features" in the JSON. → REJECT if missing.
    
    3. SECTION CHECK — Marketing Description:
       Is there a rich narrative section (300-600 words)?
       Is it PARAPHRASED (not copied) from the original? Check with Similarity Tool.
       Does it contain specific metrics every 150-200 words? → REJECT if thin or plagiarized.
    
    4. SECTION CHECK — Technical Specifications Table:
       Are ALL specs from "Technical_Specifications" JSON present?
       Cross-reference EVERY number. If draft says "300°C" but JSON says "260°C" → REJECT.
    
    5. SECTION CHECK — FAQ/Troubleshooting:
       Check the JSON. If "Support_Data" has FAQs or troubleshooting, is there a dedicated section?
       If source data exists but section is missing → REJECT.
       If no source data exists, this section can be absent (OK).
    
    6. SECTION CHECK — CTA (Why Buy From Us):
       Is there a store-specific CTA section? Does it use ONLY verified store advantages?
       → REJECT if missing or if it contains invented claims.

    7. SECTION CHECK — Expert Verdict:
       Is there an EXPERT_INSIGHT_BLOCK with a technical assessment (not marketing copy)?
       Does it cite at least one specific metric? → REJECT if missing or if it reads like 
       an advertisement.
    
    8. SECTION CHECK — Technical Tip:
       Is there a BLOCKQUOTE_TIP with a practitioner-level maintenance or usage tip?
       Is it actionable (specific condition + specific action)? → REJECT if generic.
    
    FATAL REJECTION CRITERIA (REJECT IMMEDIATELY IF):
    - EXTERNAL LINKS: ANY URLs pointing to manufacturer stores.
    - SOURCE MIMICRY: Marketing description sounds exactly like the manufacturer's page.
    - MISSING SECTIONS: Any of the 6 mandatory sections is absent (except FAQ if no source data).
    
    PLAGIARISM CHECK: Use the Similarity Tool. If uniqueness < 80% → REJECT.
    
    {language_instruction}
  expected_output: >
    A structured QA verdict containing:
    - status: "APPROVED" or "REJECTED"
    - uniqueness_score: float (0-100)
    - sections_present: list of section names found (e.g., ["Hook", "Key Features", "Marketing", "Specs", "CTA"])
    - fact_errors: list of specific inaccuracies (empty if none)
    - external_links_found: list of forbidden URLs (empty if none)
    - missing_sections: list of required sections not present (empty if none)
    - expert_insight_present: boolean
    - technical_tip_present: boolean
    DO NOT output the approved text. ONLY output the JSON verification object.
  agent: editor_qa

# tasks.yaml — REPLACE html_integration_task ENTIRELY

html_integration_task:
  description: >
    Take the approved English text and the Technical JSON specifications.
    Transform them into a flawless, OpenCart-compliant HTML structure with embedded GEO Microdata.
    
    STRICT CMS RULES:
    1. No <h1> in body. Append <br> after every </p> (except the last within a section).
       Do NOT add <br> after </h2>, </h3>, </section>, or </div>.
    2. OUTER WRAPPER: Wrap entire output in <div class="product-desc-wrap">...</div>.
    3. HTML ONLY. Absolutely zero Markdown (no ```html fences). Output raw HTML starting 
       with <div class="product-desc-wrap">.
    
    === MANDATORY HTML SKELETON (8 SECTIONS) ===
    
    SECTION 1 — PRODUCT HOOK (Schema.org Product):
    <div class="product-desc-wrap">
    <div itemscope itemtype="https://schema.org/Product">
    <p><span itemprop="name">[Product Name]</span> — <span itemprop="description">[40-75 word 
    fact-dense declarative summary]</span></p><br>
    </div>
    
    SECTION 2 — KEY SPECS QUICK TABLE:
    <div class="table-responsive">
    <table class="table table-striped table-hover table-bordered">
    <thead><tr><th>Key Feature</th><th>Specification</th></tr></thead>
    <tbody>
    <tr><td><strong>[Feature]</strong></td><td>[Value]</td></tr>
    </tbody>
    </table>
    </div>
    
    SECTION 3 — FEATURE DEEP-DIVE:
    <h2>[Question: What makes {product_name} [its primary differentiator]?]</h2>
    <h3>[Feature cluster name — specific benefit]</h3>
    <p>[1-3 paragraphs per H3 cluster]</p><br>
    [Repeat H3 blocks for each feature cluster from the copywriter's draft]
    
    SECTION 4 — APPLICATIONS:
    <h2>[Question: What are the professional applications of {product_name}?]</h2>
    <ul>
    <li><strong>[Application]:</strong> [specific workflow benefit]</li>
    </ul>
    
    SECTION 5 — EXPERT VERDICT:
    <div class="expert-insight">
    <strong>Expert Verdict:</strong> [80-120 word expert analysis from the EXPERT_INSIGHT_BLOCK]
    </div>
    
    SECTION 6 — TECHNICAL TIP:
    <blockquote>
    <strong>Expert Technical Tip:</strong> [60-100 word practitioner advice from BLOCKQUOTE_TIP]
    </blockquote>
    
    SECTION 7 — TECHNICAL SPECIFICATIONS (CRITICAL — Schema.org PropertyValue):
    <section class="specs">
    <h2>Technical specifications of the [Product Name]</h2>
    
    For EACH category in Technical_Specifications JSON, create a separate H3 + table block:
    <h3>[Category Name]</h3>
    <div class="table-responsive">
    <table class="table table-striped table-hover table-bordered">
    <tr itemprop="additionalProperty" itemscope itemtype="https://schema.org/PropertyValue">
    <td itemprop="name">[Spec Property Name]</td>
    <td itemprop="value">[Spec Value — NO trailing period]</td>
    </tr>
    [Repeat for every spec in the category]
    </table>
    </div>
    [Repeat H3+table block for EVERY category]
    
    If Technical_Specifications has "in_the_box" or package contents data, 
    render as a <ul> list WITHOUT an H3 header, preceded by <p><strong>Package contents:</strong></p>
    </section>
    
    SECTION 8A — FAQ (if Support_Data.faqs is non-empty):
    <section class="supplemental-content" itemscope itemtype="https://schema.org/FAQPage">
    <h2>Frequently Asked Questions about [Product Name]</h2>
    <div itemscope itemprop="mainEntity" itemtype="https://schema.org/Question">
    <h3 itemprop="name">[Question]</h3>
    <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
    <p itemprop="text">[Answer]</p><br>
    </div>
    </div>
    </section>
    
    SECTION 8B — TROUBLESHOOTING (if Support_Data.troubleshooting is non-empty):
    <div itemscope itemtype="https://schema.org/HowTo">
    <h2 itemprop="name">[Troubleshooting / Maintenance Guide for Product Name]</h2>
    <ol>
    <li itemprop="step" itemscope itemtype="https://schema.org/HowToStep">
    <h3 itemprop="name">Step N: [Step Name]</h3>
    <div itemprop="text"><p>[Step Description]</p></div>
    </li>
    </ol>
    </div>
    
    SECTION 9 — CTA:
    <h2>Why choose [site_name]?</h2>
    <p class="cta">[80-150 word CTA paragraph with brand representative sentence if applicable 
    from the CTA_SECTION copywriter block]</p><br>
    <ul>
    <li>[Store advantage 1]</li>
    </ul>
    <p><strong>[Urgency hook]</strong></p>
    </div>
    [Close product-desc-wrap]
    
    === IMAGE INTEGRATION RULES ===
    1. Check JSON for Official_Images. Distribute logically near relevant feature sections.
    2. NEVER hallucinate image URLs. Only use EXACT urls from JSON.
    3. Format: <img src="[url]" alt="[alt_text]" style="max-width: 100%; height: auto; 
       border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
       display: block; margin: 30px auto;">
    
    === SEMANTIC RULES ===
    - <strong> ONLY for exact metrics within paragraphs ("0.04 mm", "4,800,000 pts/s"). 
      Max 2-3 per paragraph.
    - <ul> for feature lists and application items. NEVER for key-value spec pairs.
    - <ol> for numbered steps only.
    - NO <script> tags. NO JSON-LD. Inline microdata attributes ONLY.
    - NEVER use <h1>.
    - Heading hierarchy: h2 → h3 (never skip levels).
    
    SELF-AUDIT BEFORE DELIVERY (FAIL if any is YES):
    - Wrapped in <div class="product-desc-wrap">? NO → FAIL.
    - <div itemscope itemtype="https://schema.org/Product"> on hook? NO → FAIL.
    - Specs in <section class="specs"> with per-row PropertyValue microdata? NO → FAIL.
    - FAQ in <section class="supplemental-content">? NO (if FAQ data exists) → FAIL.
    - <div class="expert-insight"> block present? NO → FAIL.
    - <blockquote> tip present? NO → FAIL.
    - Any <script> or JSON-LD? YES → FAIL.
    - Any Markdown (```html)? YES → FAIL.
    - <p class="cta"> for CTA body? NO → FAIL.
    
    {language_instruction}
  expected_output: >
    A single raw HTML string with ALL 9 sections (FAQ/Troubleshooting conditional on data):
    1. Product Hook in Schema.org/Product wrapper
    2. Key Specs Quick Table (2-col)
    3. Feature Deep-Dive (H2/H3 hierarchy, paraphrased narrative)
    4. Applications List (ul with workflow context)
    5. Expert Verdict in <div class="expert-insight">
    6. Technical Tip in <blockquote>
    7. Full Tech Specs in <section class="specs"> with per-H3-category tables 
       and itemprop="additionalProperty" PropertyValue on every <tr>
    8. FAQ in <section class="supplemental-content" itemscope FAQPage> and/or HowTo
    9. CTA with <p class="cta"> and brand representative sentence
    NO Markdown. Pure HTML starting with <div class="product-desc-wrap">.
  agent: frontend_developer

# =====================================================================
# 🌍 УНІВЕРСАЛЬНА ЗАДАЧА ЛОКАЛІЗАЦІЇ
# =====================================================================
# {market_rules} інжектується динамічно з MARKET_RULES у crew.py
# =====================================================================

localization_task:
  description: >
    Take the following finalized English HTML product page (with embedded Schema.org Microdata):
    
    --- START OF HTML ---
    {base_html}
    --- END OF HTML ---
    
    Translate and transcreate the content into {target_language} for the {site_name} audience.
    
    UNIVERSAL EXECUTION RULES (apply to ALL markets):
    1. TARGET LANGUAGE: Write the final output exclusively in {target_language}.
    2. EDGE CASE: If input language IS THE SAME as {target_language}, do NOT copy — 
       rewrite and paraphrase to improve style, flow, and SEO.
    3. GEO & SCHEMA PROTECTION: NEVER translate attribute keys (itemprop, itemscope, itemtype).
       ONLY translate the human-readable text values inside the tags. Preserve exact fact numbers.
    4. HTML INTEGRITY: Return ONLY raw HTML. NEVER translate tags, classes, URLs, 
       or image src links. The outer wrapper class "product-desc-wrap" must be 
       preserved verbatim in ALL localizations.
    5. SEO ATTRIBUTES: You MUST translate text inside alt="..." and title="..." attributes.
    6. BRAND SAFETY: Do NOT translate brand/model names (Creality, Anycubic, Bambu Lab).
       Do NOT add new marketing claims not present in the source.
    7. COMPETITOR ERADICATION: Overwrite ANY href links to foreign stores / manufacturer shops 
       with a relevant category on {site_name}, or remove the <a> tag keeping only the text.
    8. TONE: Sound like a senior technical expert speaking to an engineer, not a cheap advertisement.
    9. METRICS: Keep metric units as-is (mm, °C, kg). Never convert unless explicitly instructed.
    
    MARKET-SPECIFIC RULES:
    {market_rules}
  expected_output: >
    The localized, production-ready raw HTML string in {target_language}.
    NO Markdown blocks. NO conversational text. Pure HTML with preserved GEO Microdata.
  agent: localizer_generic