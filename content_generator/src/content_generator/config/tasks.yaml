url_discovery_task:
  description: >
    Search the web for the official manufacturer's main product page and support pages for {product_name}.
    Do NOT scrape the text yet. Only return the final list of verified URLs.
  expected_output: >
    A strict list of URLs pointing to the official manufacturer pages.
  agent: web_researcher

content_extraction_task:
  description: >
    Using the URLs approved by the human operator (provided in the input), use your WebsiteSearchTool to scrape the full product description, technical specifications, and FAQs.
  expected_output: >
    A comprehensive raw text document containing all scraped data from the approved URLs.
  agent: web_researcher

tech_specs_extraction_task:
  description: >
    Analyze the raw source text for {product_name}. 
    [INPUT DATA]: The text is either provided directly here: {raw_source_text} OR passed automatically from the Web Researcher agent's output.
    
    YOUR EXTRACTION MISSION:
    1. Extract every technical specification. 
       - FOR MACHINES: Build Volume, Max Temps, Kinematics, Speed.
       - FOR FILAMENTS: Material type (PLA/PETG), Diameter, Weight, Spool type, Melting Point, and Physical Properties.
    2. Identify Official FAQs or Maintenance guides.
    3. Categorize logical categories (e.g., "Chemical Properties" for filaments).
    4. VISUAL MEDIA EXTRACTION (CRITICAL): Scan the raw text for ANY `[OFFICIAL_IMAGE: ...]` and `[OFFICIAL_VIDEO_IFRAME: ...]` markers. Extract their data into the Pydantic "Official_Images" array.
    
    IMPORTANT JSON STRUCTURE RULE:
    Your output for "Technical_Specifications" MUST be nested by categories.
    CORRECT: { "Printing": { "Speed": "600mm/s" }, "Dimensions": { "Weight": "10kg" } }
    WRONG: { "Speed": "600mm/s", "Weight": "10kg" }
  expected_output: >
    A strict, well-structured JSON object with two main keys: 
    1. "Technical_Specifications" (grouped logically by categories).
    2. "Support_Data" (containing arrays for "FAQs" and "troubleshooting" steps if found).
    3. "Official_Images" (containing extracted visual media).
    NO conversational text, NO markdown formatting. Return ONLY the pure JSON object.
  agent: tech_specs_analyst

seo_strategy_task:
  description: >
    Analyze the raw text and technical specs (including support data) for {product_name}. 
    Develop a comprehensive SEO and GEO strategy targeted at {target_country} for {site_name}.
    1. Use your search tool to analyze real Google search autocomplete suggestions or related queries for {product_name} in {target_country}. Based on real data, select 10 high-impact keywords. 
    2. Define the unique Tone of Voice. 
    3. Create a strict Content Blueprint that MANDATES:
       - An "Answer-First" summary block (40-75 words) at the very top.
       - H2/H3 headings formatted as natural user questions (Semantic Chunking).
       - A dedicated "Troubleshooting" or "Expert Advice" section (E-E-A-T) derived from the Analyst's support data.
    4. Generate strict Meta tags following the exact length (<55/<155 chars) and symbol rules.
  expected_output: >
    A master GEO Content Brief containing:
    1. Target Keywords & Tone of Voice instructions.
    2. Structural Outline (H2/H3 Questions) explicitly marking the "Answer-First" block location.
    3. Specific E-E-A-T directives (e.g., "Include a troubleshooting tip for nozzle cleaning").
    4. SEO Metadata (JSON): H1 (Clean), Title (Safe symbols only), Description (CTA included).
  agent: seo_strategist

copywriting_task:
  description: >
    Write the master English product description for {product_name} based strictly on the Analyst's Technical JSON and the SEO Strategist's brief.

    CRITICAL SOURCE ISOLATION RULES:
    1. BURN THE SOURCE: You must NOT copy the narrative structure, tone, or marketing phrases of the raw source text. Use the raw text ONLY for factual reference.
    2. ZERO EXTERNAL LINKS: If the raw text contains links to the manufacturer's store (e.g., store.bambulab.com, creality.com) or calls to action to buy from them, YOU MUST DELETE THEM. 
    3. BRAND SAFETY: Replace any manufacturer "Buy Now" links with a generic placeholder or adapt it strictly for {site_name}.
    
    CRITICAL GEO STRUCTURE:
    1. The "Answer-First" Hook: You MUST start with a declarative, fact-dense summary (40-75 words) that immediately answers "What is this?" using hard specs.
    2. Fact Density: Throughout the body, enforce high fact density. Incorporate specific metrics (e.g., "300°C", "0.02mm") naturally every 150-200 words.
    3. E-E-A-T Section: If the Analyst's JSON contains "Support_Data" (Troubleshooting/FAQs), you MUST write a dedicated "Expert Advice" or "Maintenance" section using this data. This enables downstream 'HowTo' schema generation.
    4. Style: Follow the "No Fluff" and "Burstiness" philosophy. Never just list specs—explain "The Why" (benefits).
    5. Iframe Handling: If the JSON contains `[OFFICIAL_VIDEO_IFRAME: ...]`, logically integrate them into your text.
  expected_output: >
    A highly engaging, 100% original English product description.
    It MUST explicitly contain:
    - An "Answer-First" summary at the top.
    - A Troubleshooting/FAQ section (if source data permits).
    - Hard numbers integrated into the narrative.
    Formatted with basic semantic markers but NOT yet wrapped in final OpenCart HTML.
  agent: copywriter

quality_assurance_task:
  description: >
    Review the Copywriter's draft against the raw Technical JSON and SEO Brief.
    1. **Strict GEO Compliance:** Verify the text starts *immediately* with a declarative "Answer-First" summary (40-75 words) containing hard specs. Ensure high "Fact Density" (specific metrics like mm/°C appear every 150-200 words).
    2. **E-E-A-T Integration:** Check the Analyst's JSON. If "Support_Data" (FAQs/Troubleshooting) exists, verify the Copywriter included a dedicated section for it. If missing, REJECT the draft.
    3. **Accuracy & Uniqueness:** Cross-reference every single number against the JSON (Zero Hallucinations) and verify >80% uniqueness using the Similarity Tool.
    4. **Brand Safety & Link Check (CRITICAL):** Verify that ZERO external links to manufacturer stores (e.g., bambulab.com, creality.com) exist. Ensure there is NO generic marketing fluff. REJECT the draft immediately if found.
    
    If it fails ANY check, reject with specific instructions.
  expected_output: >
    The final, vetted English text that is 100% accurate, highly unique (>80%), and strictly follows the "Answer-First" and "Fact Density" GEO standards.
  agent: editor_qa

html_integration_task:
  description: >
    Take the approved English text and the Analyst's JSON technical specifications. 
    Transform them into a flawless, OpenCart-compliant HTML structure with embedded GEO Microdata.
    
    1. **Strict CMS Rules:** No `<h1>` in body. Append `<br>` after every `</p>` (except the last). Convert `<pre>` to `<small>`.
    2. **GEO Schema Implementation:** 
       - Identify the "Troubleshooting/Maintenance" section (if present) and wrap it in `<div itemscope itemtype="https://schema.org/HowTo">`. You MUST use ordered lists `<ol>` for the sequence of actions and apply `HowToStep` microdata to each list item (`<li>`).
       - Identify the "FAQ" section (if present) and wrap it in `<div itemscope itemtype="https://schema.org/FAQPage">`.
       - NEVER use `<script>` tags (JSON-LD). Use only inline attributes.
    3. **Tech Specs Table (CRITICAL):** Convert the JSON specs into an HTML table wrapped EXACTLY in: `<div class="table-responsive"><table class="table table-striped table-hover table-bordered">`. 
       - Inside the table, wrap property names in `<strong>` tags.
       - Ensure property values have NO trailing periods (e.g., "300mm", not "300mm.").
    4. **Semantic Highlighting & Lists:** 
       - Apply `<strong>` ONLY to hard metrics in paragraphs (e.g., "300°C"). Max 2-3 per paragraph.
       - Use `<ul>` lists ONLY for feature highlights or "What's in the box" (package contents).
       - Use `<ol>` lists for step-by-step guides or sequential instructions.
       - NEVER put technical key-value pairs in `<ul>` or `<ol>` (they belong in the table).
    
    5. CRITICAL FEW-SHOT TEMPLATE FOR HTML STRUCTURE:
    You MUST output the HTML strictly following this architectural skeleton. Do NOT invent new classes. Everything MUST be in English.
    
    <div class="premium-bambu-desc">
        <p>[Answer-First Summary Here]</p>
        
        <h3>Key Features Summary</h3>
        <ul>
            <li><strong>[Spec Name]:</strong> [Spec Description]</li>
        </ul>
        
        <h2>[Feature H2 Question]</h2>
        <p>[Feature Explanation]</p>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <tbody>
                    <tr><th scope="row">[JSON Spec Key]</th><td>[JSON Spec Value]</td></tr>
                </tbody>
            </table>
        </div>
        
        <div itemscope="" itemtype="https://schema.org/HowTo">
            <h2 itemprop="name">[Troubleshooting Guide Title]</h2>
            <div itemprop="step" itemscope="" itemtype="https://schema.org/HowToStep">
                <h4 itemprop="name">Step 1: [Step Name]</h4>
                <div itemprop="text"><p>[Step Description]</p></div>
            </div>
        </div>
    </div>

    CRITICAL IMAGE INTEGRATION RULES:
    1. Check the Analyst's JSON for "Official_Images". 
    2. You MUST logically distribute these images throughout the HTML body (e.g., placing a speed-related image under the "High Speed" H2/H3 section).
    3. NEVER hallucinate image URLs. Only use the EXACT urls provided in the JSON.
    4. Image HTML strictly must follow this format: 
       <img src="[url]" alt="[alt_text]" style="max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); display: block; margin: 30px auto;">
  expected_output: >
    A single, raw HTML string containing the fully formatted product page.
    MUST include:
    - The "Answer-First" block at the top.
    - The responsive Tech Specs Table (no trailing periods).
    - Inline Schema.org Microdata for FAQs/HowTo.
    - `<ul>` or `<ol>` lists for package contents, features, or sequential steps (if applicable).
    NO Markdown code blocks. Just the pure HTML code starting with the `<div class="premium-bambu-desc">` tag.
  agent: frontend_developer

localization_task:
  description: >
    Take the following finalized English HTML product page (which contains embedded Schema.org Microdata):
    
    --- START OF HTML ---
    {base_html}
    --- END OF HTML ---
    
    Translate and transcreate the content into {target_language} specifically for the {site_name} audience.
    
    CRITICAL EXECUTION RULES:
    1. **Apply Your Persona:** strictly follow the geographical, logistical, and measurement rules defined in your specific Agent Backstory.
    2. **GEO & Schema Protection:** The input HTML contains inline Microdata attributes. NEVER translate attribute keys (`itemprop`, `itemscope`). ONLY translate the human-readable text values inside the tags.
    3. **HTML Integrity:** Return ONLY the raw HTML string. NEVER translate HTML tags (`<div>`, `<p>`, `<img>`), classes, or image URLs. Do NOT add Markdown (```html).
    4. **SEO:** You MUST translate the text inside `alt="..."` and `title="..."` attributes.
    5. **Brand Safety:** Do NOT translate Brand or Model names. Replace foreign competitor links with {site_name} equivalents.
  expected_output: >
    The localized, production-ready raw HTML string in {target_language}.
    NO Markdown code blocks. NO conversational text. Just the pure HTML code with preserved GEO Microdata.
  agent: localizer_ua